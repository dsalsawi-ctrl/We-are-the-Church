<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>We Are The Church | Addis Ababa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav id="navbar">
    <div class="nav-container">
      <div class="logo flex flex-col justify-center">
        <span class="font-serif text-lg md:text-xl tracking-[0.05em] uppercase font-bold text-[var(--charcoal)] leading-tight">We Are The Church</span>
        <span class="text-[8px] md:text-[9px] tracking-[0.2em] uppercase text-gray-500 mt-1 font-sans font-medium">One Family In Christ</span>
      </div>
      <div class="desktop-menu">
        <button onclick="navigateTo('home', this)" class="nav-btn active">The Vision</button>
        <button onclick="navigateTo('houses', this)" class="nav-btn">House Churches</button>
        <button onclick="navigateTo('join', this)" class="nav-btn">Request Invitation</button>
        <button onclick="navigateTo('contact', this)" class="nav-btn">Contact Us</button>
      </div>
    </div>
  </nav>

  <main>
    <section id="home" class="spa-section active">
        <div class="hero-box">
            <div class="hero-image" style="background-image: url('hero-family1.jpg');"></div>
            <div class="hero-content">
                <h1 class="massive-title font-serif italic text-white">The table is set.</h1>
                <p class="hero-desc uppercase tracking-[0.4em]">Simple Church. Real Family. Addis Ababa.</p>
            </div>
        </div>
    </section>

    <section id="houses" class="spa-section content-section">
        <div class="container">
            <h2 class="font-serif text-6xl italic mb-20 text-center">Our Gatherings</h2>
            <div id="house-grid" class="house-grid"></div>
        </div>
    </section>

    <section id="join" class="spa-section content-section bg-white">
        <div class="container max-w-4xl">
            <div class="text-center mb-20">
                <h2 class="font-serif text-6xl italic mb-6">Join A Gathering</h2>
                <p class="text-gray-500 font-light">Tell us where you are, and we'll help you find your seat.</p>
            </div>
            <form id="platinumJoinForm">
                <div class="grid md:grid-cols-2 gap-10 mb-10">
                    <div class="input-row"><input type="text" name="name" placeholder="Full Name" required></div>
                    <div class="input-row"><input type="email" name="email" placeholder="Email Address" required></div>
                </div>
                <div class="input-row">
                    <select name="neighborhood" required>
                        <option value="" disabled selected>Select Your Neighborhood</option>
                        <option value="Bole">Bole</option>
                        <option value="Old Airport">Old Airport</option>
                        <option value="Sarbet">Sarbet</option>
                        <option value="CMC">CMC / Ayat</option>
                        <option value="Kazanchis">Kazanchis / Haya Hulet</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-6 bg-[var(--charcoal)] text-[var(--gold)] text-xs font-bold tracking-[0.4em] uppercase hover:bg-black transition-all">Request Invitation</button>
            </form>
        </div>
    </section>

    <section id="contact" class="spa-section content-section bg-[var(--bone)]">
        <div class="container max-w-4xl">
            <div class="text-center mb-20">
                <h2 class="font-serif text-6xl italic mb-6">Reach Out</h2>
                <p class="text-gray-500 font-light">Questions about the vision? We'd love to hear from you.</p>
            </div>
            <form id="contactForm">
                <div class="input-row"><input type="email" name="email" placeholder="Your Email" required></div>
                <div class="input-row"><textarea name="message" placeholder="Your Message" rows="4" required></textarea></div>
                <button type="submit" class="w-full py-6 border-2 border-[var(--charcoal)] text-[var(--charcoal)] text-xs font-bold tracking-[0.4em] uppercase hover:bg-[var(--charcoal)] hover:text-[var(--gold)] transition-all">Send Message</button>
            </form>
        </div>
    </section>
  </main>

  <div id="mobile-sticky-cta" class="md:hidden fixed bottom-0 left-0 w-full z-40 bg-[var(--charcoal)]">
      <button onclick="navigateTo('join')" class="w-full py-6 text-[var(--gold)] text-[11px] font-bold tracking-[0.4em] uppercase">Join A Gathering</button>
  </div>

  <div id="success-modal" class="modal-overlay">
    <div class="success-card bg-[var(--bone)] p-14 text-center shadow-2xl max-w-sm w-full mx-4 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-[var(--gold)]"></div>
        <div class="mb-6 flex justify-center text-[var(--gold)]"><i data-lucide="check-circle" size="56"></i></div>
        <h3 class="font-serif text-4xl mb-4 italic text-[var(--charcoal)]">Success</h3>
        <p class="text-gray-500 mb-10 font-light text-sm">Processing...</p>
        <button onclick="closeSuccessModal()" class="text-[10px] font-bold uppercase tracking-[.3em] border-b border-[var(--charcoal)]">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
